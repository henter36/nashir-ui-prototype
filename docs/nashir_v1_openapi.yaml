    ReadinessStatus:
      type: string
      description: >
        Normalized readiness state for a single dimension. "unknown" means the dimension
        state cannot be resolved and must not be treated as ready by any consumer,
        schema validator, or execution engine. "not_applicable" means the dimension
        does not apply to this step type.
      enum:
        - ready
        - warning
        - blocked
        - unknown
        - not_applicable
    ReadinessSignal:
      type: object
      description: >
        Normalized per-dimension readiness signal. When returned as a standalone response
        the "dimension" field is required to identify which of the ten readiness dimensions
        this signal represents. When embedded as a named field inside WorkflowStepReadiness
        the field name acts as discriminator and "dimension" may be omitted.
        "score" is advisory only and must not gate execution; execution denial is determined
        by the presence of non-empty "blockers", not by score threshold.
        No secret value, raw API key, or credential string may appear in any field of this schema.
      required:
        - status
        - score
        - blockers
        - warnings
        - checks
        - updatedAt
      properties:
        dimension:
          type: string
          description: Required when returned as a standalone response. Identifies which readiness dimension this signal represents.
          enum:
            - providerReady
            - routeReady
            - promptReady
            - costReady
            - reviewReady
            - destinationReady
            - inputReady
            - outputReady
            - triggerReady
            - dataSourceReady
        status:
          $ref: "#/components/schemas/ReadinessStatus"
        score:
          type: integer
          minimum: 0
          maximum: 100
          description: Advisory proportion of satisfied checks. Must not be used to gate execution. Execution denial is determined by non-empty blockers only.
        blockers:
          type: array
          items:
            type: string
          description: Non-empty array means this dimension is blocked and drives execution denial.
        warnings:
          type: array
          items:
            type: string
          description: Surfaced to the user. Do not block dry-run display.
        checks:
          type: array
          items:
            type: string
          description: Passing checks. Not execution conditions.
        owner:
          type: string
          description: Domain module name of the owning module. Not a UI page reference.
        evidenceSummary:
          type: string
          description: Human-readable summary. Must not contain raw secrets, API keys, or credentials.
        nextAction:
          type:
            - string
            - "null"
          description: User-facing remediation guidance.
        updatedAt:
          type: string
          format: date-time
          description: Timestamp of evaluation.
    WorkflowStepReadiness:
      type: object
      description: >
        Aggregate readiness for a single workflow step across all ten dimensions.
        "overallStatus" is "blocked" if any required dimension has non-empty blockers.
        "score" on embedded ReadinessSignal fields is advisory only and must not gate execution.
        "stepKey" is stable within the composite scope (workflowDefinitionId, workflowVersion) only.
        Consumers must not use stepKey alone as a durable cross-version reference;
        the durable reference is the tuple (workflowDefinitionId, workflowVersion, stepKey).
      required:
        - workflowDefinitionId
        - workflowVersion
        - stepKey
        - triggerReady
        - inputReady
        - providerReady
        - routeReady
        - promptReady
        - costReady
        - reviewReady
        - outputReady
        - destinationReady
        - dataSourceReady
        - overallStatus
        - blockers
        - warnings
        - updatedAt
      properties:
        workflowDefinitionId:
          type: string
        workflowVersion:
          type: string
          description: Version of the workflow definition. Use "workflowVersion" consistently; do not use bare "version" for workflow composite identity.
        stepKey:
          type: string
          description: >
            Stable step identifier within the composite scope (workflowDefinitionId, workflowVersion) only.
            Not a user-facing display label. Consumers must not use stepKey alone as a durable
            cross-version reference. The durable reference is the tuple
            (workflowDefinitionId, workflowVersion, stepKey).
        triggerReady:
          $ref: "#/components/schemas/ReadinessSignal"
        inputReady:
          $ref: "#/components/schemas/ReadinessSignal"
        providerReady:
          $ref: "#/components/schemas/ReadinessSignal"
        routeReady:
          $ref: "#/components/schemas/ReadinessSignal"
        promptReady:
          $ref: "#/components/schemas/ReadinessSignal"
        costReady:
          $ref: "#/components/schemas/CostReadinessSnapshot"
        reviewReady:
          $ref: "#/components/schemas/ReadinessSignal"
        outputReady:
          $ref: "#/components/schemas/ReadinessSignal"
        destinationReady:
          $ref: "#/components/schemas/ReadinessSignal"
        dataSourceReady:
          $ref: "#/components/schemas/DataSourceReadinessSnapshot"
        overallStatus:
          $ref: "#/components/schemas/ReadinessStatus"
        blockers:
          type: array
          items:
            type: string
          description: Aggregate of all dimension blockers.
        warnings:
          type: array
          items:
            type: string
          description: Aggregate of all dimension warnings.
        checks:
          type: array
          items:
            type: string
        nextActions:
          type: array
          items:
            type: string
        evidenceSummary:
          type: string
          description: Aggregate summary. No secrets.
        updatedAt:
          type: string
          format: date-time
    WorkspaceReadinessSummary:
      type: object
      description: >
        Advisory rollup of readiness status across all active workflow definitions in a workspace.
        Does not gate or authorize workflow execution.
      required:
        - workspaceId
        - overallStatus
        - totalActiveWorkflows
        - blockedWorkflows
        - warningWorkflows
        - readyWorkflows
        - unknownWorkflows
        - updatedAt
      properties:
        workspaceId:
          type: string
        overallStatus:
          $ref: "#/components/schemas/ReadinessStatus"
        totalActiveWorkflows:
          type: integer
          minimum: 0
        blockedWorkflows:
          type: integer
          minimum: 0
          description: Workflows with at least one blocked step.
        warningWorkflows:
          type: integer
          minimum: 0
          description: Workflows with at least one warning and no blocked steps.
        readyWorkflows:
          type: integer
          minimum: 0
          description: Workflows with all steps ready.
        unknownWorkflows:
          type: integer
          minimum: 0
          description: Workflows with at least one unknown dimension.
        updatedAt:
          type: string
          format: date-time
    WorkflowReadinessSnapshot:
      type: object
      description: Per-workflow readiness covering all steps across all ten dimensions.
      required:
        - workflowDefinitionId
        - workflowVersion
        - overallStatus
        - stepReadiness
        - blockers
        - warnings
        - updatedAt
      properties:
        workflowDefinitionId:
          type: string
        workflowVersion:
          type: string
          description: Version of the workflow definition. Use "workflowVersion" consistently.
        overallStatus:
          $ref: "#/components/schemas/ReadinessStatus"
        stepReadiness:
          type: array
          items:
            $ref: "#/components/schemas/WorkflowStepReadiness"
          description: One entry per step. Not a paginated list resource.
        blockers:
          type: array
          items:
            type: string
        warnings:
          type: array
          items:
            type: string
        updatedAt:
          type: string
          format: date-time
    ProviderReadinessSnapshot:
      type: object
      description: >
        Read-only snapshot of provider health and readiness. No secret values are returned.
        This endpoint reads a stored snapshot and does not probe the live provider.
        "secretReferenceName" is a vault reference name only; no raw API key, raw secret value,
        or credential string is returned by this endpoint under any circumstances.
      required:
        - providerId
        - dimension
        - status
        - healthStatus
        - supportedCapabilities
        - supportedModels
        - secretReferenceName
        - score
        - blockers
        - warnings
        - updatedAt
      properties:
        providerId:
          type: string
        dimension:
          type: string
          enum:
            - providerReady
        status:
          $ref: "#/components/schemas/ReadinessStatus"
        healthStatus:
          type: string
          enum:
            - healthy
            - degraded
            - unavailable
            - unknown
        lastTestedAt:
          type:
            - string
            - "null"
          format: date-time
          description: Null if never tested.
        supportedCapabilities:
          type: array
          items:
            type: string
        supportedModels:
          type: array
          items:
            type: string
        secretReferenceName:
          type: string
          description: Vault reference name only. No raw secret value, API key, or credential is returned.
        score:
          type: integer
          minimum: 0
          maximum: 100
          description: Advisory only. Must not gate execution.
        blockers:
          type: array
          items:
            type: string
        warnings:
          type: array
          items:
            type: string
        updatedAt:
          type: string
          format: date-time
    RouteReadinessSnapshot:
