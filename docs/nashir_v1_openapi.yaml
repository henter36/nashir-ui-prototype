openapi: 3.1.0
info:
  title: Nashir V1 API
  version: 0.1.0
  description: Contract-first API for Nashir V1. Slice 1 covers Products and Assets. Slice 2 adds Campaign Content + Review/Preview metadata only.
servers:
  - url: https://api.example.invalid
    description: Placeholder server. Not a production endpoint.
tags:
  - name: Health
    description: Basic service status checks.
  - name: Products
    description: Product catalog metadata. Product names are display fields only; productId is canonical.
  - name: Assets
    description: Asset library metadata. Asset names and file names are display fields only; assetId is canonical.
  - name: Campaign Content
    description: Campaign content drafts, review state, and preview metadata. Slice 2 does not execute AI, publish, schedule, upload binaries, or run external integrations.
paths:
  /health:
    get:
      operationId: getHealth
      tags:
        - Health
      summary: Get service health.
      description: Returns a simple placeholder health response for contract validation.
      parameters:
        - $ref: "#/components/parameters/RequestIdHeader"
      responses:
        "200":
          description: Service health response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
        default:
          $ref: "#/components/responses/DefaultError"
  /workspaces/{workspaceId}/products:
    get:
      operationId: listProducts
      tags:
        - Products
      summary: List products.
      description: Lists product catalog records for a workspace. Product names are not identity; productId is canonical.
      parameters:
        - $ref: "#/components/parameters/WorkspaceIdPath"
        - $ref: "#/components/parameters/LimitQuery"
        - $ref: "#/components/parameters/CursorQuery"
        - $ref: "#/components/parameters/StatusQuery"
        - $ref: "#/components/parameters/UpdatedAfterQuery"
        - $ref: "#/components/parameters/SortQuery"
        - $ref: "#/components/parameters/RequestIdHeader"
      responses:
        "200":
          description: Product list response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductListResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        default:
          $ref: "#/components/responses/DefaultError"
    post:
      operationId: createProduct
      tags:
        - Products
      summary: Create product.
      description: Creates product metadata for the workspace. This endpoint does not create assets, campaigns, connector runs, or AI output.
      parameters:
        - $ref: "#/components/parameters/WorkspaceIdPath"
        - $ref: "#/components/parameters/IdempotencyKeyHeader"
        - $ref: "#/components/parameters/RequestIdHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProductRequest"
      responses:
        "201":
          description: Product created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/ValidationFailed"
        default:
          $ref: "#/components/responses/DefaultError"
  /workspaces/{workspaceId}/products/{productId}:
    get:
      operationId: getProduct
      tags:
        - Products
      summary: Get product.
      description: Reads one product by productId. Product names are display labels and must not be used as identity.
      parameters:
        - $ref: "#/components/parameters/WorkspaceIdPath"
        - $ref: "#/components/parameters/ProductIdPath"
        - $ref: "#/components/parameters/RequestIdHeader"
      responses:
        "200":
          description: Product response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductResponse"
        "404":
          $ref: "#/components/responses/NotFound"
        default:
          $ref: "#/components/responses/DefaultError"
    put:
      operationId: updateProduct
      tags:
        - Products
      summary: Update product.
      description: Updates product metadata. Clients must send If-Match or X-Resource-Version for optimistic concurrency.
      parameters:
        - $ref: "#/components/parameters/WorkspaceIdPath"
        - $ref: "#/components/parameters/ProductIdPath"
        - $ref: "#/components/parameters/IfMatchHeader"
        - $ref: "#/components/parameters/ResourceVersionHeader"
        - $ref: "#/components/parameters/RequestIdHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProductRequest"
      responses:
        "200":
          description: Product updated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/ValidationFailed"
        default:
          $ref: "#/components/responses/DefaultError"
  /workspaces/{workspaceId}/assets:
    get:
      operationId: listAssets
      tags:
        - Assets
      summary: List assets.
      description: Lists asset metadata for a workspace. Asset names and file names are not identity; assetId is canonical.
      parameters:
        - $ref: "#/components/parameters/WorkspaceIdPath"
        - $ref: "#/components/parameters/LimitQuery"
        - $ref: "#/components/parameters/CursorQuery"
        - $ref: "#/components/parameters/StatusQuery"
        - $ref: "#/components/parameters/AssetTypeQuery"
        - $ref: "#/components/parameters/LinkedProductIdQuery"
        - $ref: "#/components/parameters/UpdatedAfterQuery"
        - $ref: "#/components/parameters/SortQuery"
        - $ref: "#/components/parameters/RequestIdHeader"
      responses:
        "200":
          description: Asset list response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssetListResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        default:
          $ref: "#/components/responses/DefaultError"
    post:
      operationId: createAsset
      tags:
        - Assets
      summary: Create asset metadata.
      description: Creates asset metadata or an asset reference only. This does not upload binary files, approve rights, publish content, execute connectors, or invoke AI.
      parameters:
        - $ref: "#/components/parameters/WorkspaceIdPath"
        - $ref: "#/components/parameters/IdempotencyKeyHeader"
        - $ref: "#/components/parameters/RequestIdHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAssetRequest"
      responses:
        "201":
          description: Asset metadata created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssetResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/ValidationFailed"
        default:
          $ref: "#/components/responses/DefaultError"
  /workspaces/{workspaceId}/assets/{assetId}:
    get:
      operationId: getAsset
      tags:
        - Assets
      summary: Get asset.
      description: Reads one asset by assetId. Asset names and file names are display labels and must not be used as identity.
      parameters:
        - $ref: "#/components/parameters/WorkspaceIdPath"
        - $ref: "#/components/parameters/AssetIdPath"
        - $ref: "#/components/parameters/RequestIdHeader"
      responses:
        "200":
          description: Asset response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssetResponse"
        "404":
          $ref: "#/components/responses/NotFound"
        default:
          $ref: "#/components/responses/DefaultError"
    put:
      operationId: updateAsset
      tags:
        - Assets
      summary: Update asset metadata.
      description: Updates asset metadata only. Clients must send If-Match or X-Resource-Version for optimistic concurrency. Updating an asset does not approve rights automatically.
      parameters:
        - $ref: "#/components/parameters/WorkspaceIdPath"
        - $ref: "#/components/parameters/AssetIdPath"
        - $ref: "#/components/parameters/IfMatchHeader"
        - $ref: "#/components/parameters/ResourceVersionHeader"
        - $ref: "#/components/parameters/RequestIdHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAssetRequest"
      responses:
        "200":
          description: Asset updated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssetResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/ValidationFailed"
        default:
          $ref: "#/components/responses/DefaultError"
  /workspaces/{workspaceId}/assets/{assetId}/link-product:
    post:
      operationId: linkAssetToProduct
      tags:
        - Assets
      summary: Link asset metadata to product.
      description: Links an asset metadata record to a product. This updates metadata only and does not approve asset rights, upload files, publish content, execute connectors, or invoke AI.
      parameters:
        - $ref: "#/components/parameters/WorkspaceIdPath"
        - $ref: "#/components/parameters/AssetIdPath"
        - $ref: "#/components/parameters/IdempotencyKeyHeader"
        - $ref: "#/components/parameters/RequestIdHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LinkAssetToProductRequest"
      responses:
        "200":
          description: Asset linked to product.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssetResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/ValidationFailed"
        default:
          $ref: "#/components/responses/DefaultError"
  /workspaces/{workspaceId}/campaign-contents:
    get:
      operationId: listCampaignContents
      tags:
        - Campaign Content
      summary: List campaign content.
      description: Lists campaign content records for a workspace. campaignContentId is canonical identity. Product and asset names may appear only as display snapshots; productId and assetId remain canonical links. This slice does not execute AI, publish, schedule, upload binary assets, or call connectors.
      parameters:
        - $ref: "#/components/parameters/WorkspaceIdPath"
        - $ref: "#/components/parameters/LimitQuery"
        - $ref: "#/components/parameters/CursorQuery"
        - $ref: "#/components/parameters/StatusQuery"
        - $ref: "#/components/parameters/UpdatedAfterQuery"
        - $ref: "#/components/parameters/SortQuery"
        - $ref: "#/components/parameters/RequestIdHeader"
      responses:
        "200":
          description: Campaign content list response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CampaignContentListResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/PermissionDenied"
        "500":
          $ref: "#/components/responses/InternalServerError"
        default:
          $ref: "#/components/responses/DefaultError"
    post:
      operationId: createCampaignContent
      tags:
        - Campaign Content
      summary: Create campaign content draft.
      description: Creates campaign content metadata and editable body content linked to an existing productId and optional existing assetIds. It does not execute AI, publish, schedule, upload binary assets, or approve asset rights.
      parameters:
        - $ref: "#/components/parameters/WorkspaceIdPath"
        - $ref: "#/components/parameters/IdempotencyKeyHeader"
        - $ref: "#/components/parameters/RequestIdHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CampaignContentCreateRequest"
      responses:
        "201":
          description: Campaign content created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CampaignContentResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/PermissionDenied"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/ValidationFailed"
        "500":
          $ref: "#/components/responses/InternalServerError"
        default:
          $ref: "#/components/responses/DefaultError"
  /workspaces/{workspaceId}/campaign-contents/{campaignContentId}:
    get:
      operationId: getCampaignContent
      tags:
        - Campaign Content
      summary: Get campaign content.
      description: Reads one campaign content record by campaignContentId. Names in snapshots are display-only and must not be used as identity.
      parameters:
        - $ref: "#/components/parameters/WorkspaceIdPath"
        - $ref: "#/components/parameters/CampaignContentIdPath"
        - $ref: "#/components/parameters/RequestIdHeader"
      responses:
        "200":
          description: Campaign content response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CampaignContentResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/PermissionDenied"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"
        default:
          $ref: "#/components/responses/DefaultError"
    put:
      operationId: updateCampaignContent
      tags:
        - Campaign Content
      summary: Update campaign content.
      description: Updates campaign content metadata or editable body content. Clients must send If-Match or X-Resource-Version for optimistic concurrency. Updating approved content should be handled by implementation policy and must not imply publishing.
      parameters:
        - $ref: "#/components/parameters/WorkspaceIdPath"
        - $ref: "#/components/parameters/CampaignContentIdPath"
        - $ref: "#/components/parameters/IfMatchHeader"
        - $ref: "#/components/parameters/ResourceVersionHeader"
        - $ref: "#/components/parameters/RequestIdHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CampaignContentUpdateRequest"
      responses:
        "200":
          description: Campaign content updated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CampaignContentResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/PermissionDenied"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/ValidationFailed"
        "500":
          $ref: "#/components/responses/InternalServerError"
        default:
          $ref: "#/components/responses/DefaultError"
  /workspaces/{workspaceId}/campaign-contents/{campaignContentId}/submit-review:
    post:
      operationId: submitCampaignContentReview
      tags:
        - Campaign Content
      summary: Submit campaign content for review.
      description: Moves draft or ready content toward review using campaignContentId identity. This is a review transition only and does not execute AI, publish, schedule, or upload assets. Clients should send Idempotency-Key and a current If-Match or X-Resource-Version value.
      parameters:
        - $ref: "#/components/parameters/WorkspaceIdPath"
        - $ref: "#/components/parameters/CampaignContentIdPath"
        - $ref: "#/components/parameters/IdempotencyKeyHeader"
        - $ref: "#/components/parameters/IfMatchHeader"
        - $ref: "#/components/parameters/ResourceVersionHeader"
        - $ref: "#/components/parameters/RequestIdHeader"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReviewSubmitRequest"
      responses:
        "200":
          description: Campaign content submitted for review.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CampaignContentResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/PermissionDenied"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/ValidationFailed"
        "500":
          $ref: "#/components/responses/InternalServerError"
        default:
          $ref: "#/components/responses/DefaultError"
  /workspaces/{workspaceId}/campaign-contents/{campaignContentId}/approve:
    post:
      operationId: approveCampaignContent
      tags:
        - Campaign Content
      summary: Approve campaign content review.
      description: Moves in-review content to approved as a review decision only. This does not publish, schedule, execute AI, or approve asset rights automatically. Clients should send Idempotency-Key and a current If-Match or X-Resource-Version value.
      parameters:
        - $ref: "#/components/parameters/WorkspaceIdPath"
        - $ref: "#/components/parameters/CampaignContentIdPath"
        - $ref: "#/components/parameters/IdempotencyKeyHeader"
        - $ref: "#/components/parameters/IfMatchHeader"
        - $ref: "#/components/parameters/ResourceVersionHeader"
        - $ref: "#/components/parameters/RequestIdHeader"
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReviewDecisionRequest"
      responses:
        "200":
          description: Campaign content approved.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CampaignContentResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/PermissionDenied"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/ValidationFailed"
        "500":
          $ref: "#/components/responses/InternalServerError"
        default:
          $ref: "#/components/responses/DefaultError"
  /workspaces/{workspaceId}/campaign-contents/{campaignContentId}/reject:
    post:
      operationId: rejectCampaignContent
      tags:
        - Campaign Content
      summary: Reject campaign content review.
      description: Moves in-review content to rejected and captures review feedback. This is a review decision only and does not publish, schedule, execute AI, or upload assets. Clients should send Idempotency-Key and a current If-Match or X-Resource-Version value.
      parameters:
        - $ref: "#/components/parameters/WorkspaceIdPath"
        - $ref: "#/components/parameters/CampaignContentIdPath"
        - $ref: "#/components/parameters/IdempotencyKeyHeader"
        - $ref: "#/components/parameters/IfMatchHeader"
        - $ref: "#/components/parameters/ResourceVersionHeader"
        - $ref: "#/components/parameters/RequestIdHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReviewDecisionRequest"
      responses:
        "200":
          description: Campaign content rejected.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CampaignContentResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/PermissionDenied"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/ValidationFailed"
        "500":
          $ref: "#/components/responses/InternalServerError"
        default:
          $ref: "#/components/responses/DefaultError"
  /workspaces/{workspaceId}/campaign-contents/{campaignContentId}/preview-artifacts:
    get:
      operationId: listCampaignContentPreviewArtifacts
      tags:
        - Campaign Content
      summary: List preview artifacts.
      description: Lists preview metadata for campaign content. PreviewArtifact is a metadata contract, not a rendered binary upload contract.
      parameters:
        - $ref: "#/components/parameters/WorkspaceIdPath"
        - $ref: "#/components/parameters/CampaignContentIdPath"
        - $ref: "#/components/parameters/LimitQuery"
        - $ref: "#/components/parameters/CursorQuery"
        - $ref: "#/components/parameters/StatusQuery"
        - $ref: "#/components/parameters/UpdatedAfterQuery"
        - $ref: "#/components/parameters/SortQuery"
        - $ref: "#/components/parameters/RequestIdHeader"
      responses:
        "200":
          description: Preview artifact list response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PreviewArtifactListResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/PermissionDenied"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalServerError"
        default:
          $ref: "#/components/responses/DefaultError"
    post:
      operationId: createCampaignContentPreviewArtifact
      tags:
        - Campaign Content
      summary: Create preview artifact metadata.
      description: Creates preview artifact metadata for campaign content. This does not upload binary assets, render final files, execute AI, publish, or schedule.
      parameters:
        - $ref: "#/components/parameters/WorkspaceIdPath"
        - $ref: "#/components/parameters/CampaignContentIdPath"
        - $ref: "#/components/parameters/IdempotencyKeyHeader"
        - $ref: "#/components/parameters/RequestIdHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PreviewArtifactCreateRequest"
      responses:
        "201":
          description: Preview artifact metadata created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PreviewArtifactResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/PermissionDenied"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/ValidationFailed"
        "500":
          $ref: "#/components/responses/InternalServerError"
        default:
          $ref: "#/components/responses/DefaultError"
components:
  parameters:
    WorkspaceIdPath:
      name: workspaceId
      in: path
      required: true
      description: Stable opaque workspace identifier.
      schema:
        type: string
        minLength: 1
    ProductIdPath:
      name: productId
      in: path
      required: true
      description: Stable opaque product identifier. Product names are not identity.
      schema:
        type: string
        minLength: 1
    AssetIdPath:
      name: assetId
      in: path
      required: true
      description: Stable opaque asset identifier. Asset names and file names are not identity.
      schema:
        type: string
        minLength: 1
    CampaignContentIdPath:
      name: campaignContentId
      in: path
      required: true
      description: Stable opaque campaign content identifier. Campaign content titles are not identity.
      schema:
        type: string
        minLength: 1
    LimitQuery:
      name: limit
      in: query
      required: false
      description: Maximum number of records to return.
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 25
    CursorQuery:
      name: cursor
      in: query
      required: false
      description: Cursor for the next page.
      schema:
        type: string
    StatusQuery:
      name: status
      in: query
      required: false
      description: Optional resource status filter.
      schema:
        type: string
    UpdatedAfterQuery:
      name: updatedAfter
      in: query
      required: false
      description: Return resources updated after this timestamp.
      schema:
        type: string
        format: date-time
    SortQuery:
      name: sort
      in: query
      required: false
      description: Stable sort expression such as updatedAt:desc.
      schema:
        type: string
    AssetTypeQuery:
      name: type
      in: query
      required: false
      description: Optional asset type filter.
      schema:
        $ref: "#/components/schemas/AssetType"
    LinkedProductIdQuery:
      name: linkedProductId
      in: query
      required: false
      description: Optional product link filter.
      schema:
        type: string
    IdempotencyKeyHeader:
      name: Idempotency-Key
      in: header
      required: true
      description: Required for POST create/link operations to prevent duplicate writes.
      schema:
        type: string
        minLength: 8
        maxLength: 255
    IfMatchHeader:
      name: If-Match
      in: header
      required: false
      description: Optional concurrency token. PUT operations require either If-Match or X-Resource-Version.
      schema:
        type: string
    ResourceVersionHeader:
      name: X-Resource-Version
      in: header
      required: false
      description: Optional resource version. PUT operations require either If-Match or X-Resource-Version.
      schema:
        type: string
    RequestIdHeader:
      name: X-Request-Id
      in: header
      required: false
      description: Optional client request tracking identifier.
      schema:
        type: string
  responses:
    BadRequest:
      description: Bad request.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorModel"
    Unauthorized:
      description: Authentication is required or was not accepted.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorModel"
    PermissionDenied:
      description: Permission denied.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorModel"
    NotFound:
      description: Resource not found.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorModel"
    Conflict:
      description: Conflict, idempotency conflict, or version mismatch.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorModel"
    ValidationFailed:
      description: Validation failed.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorModel"
    RateLimited:
      description: Rate limit exceeded.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorModel"
    InternalServerError:
      description: Internal server error.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorModel"
    DefaultError:
      description: Error response.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorModel"
  schemas:
    HealthResponse:
      type: object
      required:
        - data
      properties:
        data:
          type: object
          required:
            - service
            - status
            - version
          properties:
            service:
              type: string
              example: nashir-v1-api
            status:
              type: string
              enum:
                - ok
                - degraded
            version:
              type: string
              example: 0.1.0
    ErrorCode:
      type: string
      enum:
        - workspace.not_found
        - resource.not_found
        - validation.failed
        - permission.denied
        - conflict.version_mismatch
        - idempotency.conflict
        - rate_limit.exceeded
        - review.required
        - publishing.blocked
        - provider.not_ready
        - model_route.not_ready
        - prompt_template.not_approved
        - cost_policy.exceeded
    ErrorModel:
      type: object
      required:
        - errorCode
        - message
        - requestId
        - retryable
        - status
      properties:
        errorCode:
          $ref: "#/components/schemas/ErrorCode"
        message:
          type: string
        details:
          type: object
          additionalProperties: true
        requestId:
          type: string
        retryable:
          type: boolean
        status:
          type: integer
          minimum: 100
          maximum: 599
    PaginationMeta:
      type: object
      required:
        - count
        - hasMore
      properties:
        nextCursor:
          type:
            - string
            - "null"
        count:
          type: integer
          minimum: 0
        hasMore:
          type: boolean
    Warning:
      type: object
      required:
        - code
        - message
        - severity
      properties:
        code:
          type: string
        message:
          type: string
        severity:
          type: string
          enum:
            - info
            - warning
            - critical
    Readiness:
      type: object
      description: Readiness summary for UI and API consumers. It is advisory and does not execute publishing, connectors, or AI.
      required:
        - score
        - label
        - issues
      properties:
        score:
          type: number
          minimum: 0
          maximum: 100
        label:
          type: string
        issues:
          type: array
          items:
            type: string
    ProductStatus:
      type: string
      enum:
        - draft
        - active
        - archived
    StockStatus:
      type: string
      enum:
        - available
        - limited
        - out_of_stock
        - unknown
    Product:
      type: object
      description: Product catalog record. productId is canonical identity; product name is only a display field.
      required:
        - productId
        - workspaceId
        - name
        - status
        - createdAt
        - updatedAt
        - version
      properties:
        productId:
          type: string
        workspaceId:
          type: string
        name:
          type: string
        category:
          type:
            - string
            - "null"
        price:
          type:
            - number
            - "null"
          minimum: 0
        sku:
          type:
            - string
            - "null"
        stockStatus:
          $ref: "#/components/schemas/StockStatus"
        imageUrl:
          type:
            - string
            - "null"
          format: uri
        videoUrl:
          type:
            - string
            - "null"
          format: uri
        description:
          type:
            - string
            - "null"
        readiness:
          $ref: "#/components/schemas/Readiness"
        status:
          $ref: "#/components/schemas/ProductStatus"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        version:
          type: string
    CreateProductRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          minLength: 1
        category:
          type: string
        price:
          type: number
          minimum: 0
        sku:
          type: string
        stockStatus:
          $ref: "#/components/schemas/StockStatus"
        imageUrl:
          type: string
          format: uri
        videoUrl:
          type: string
          format: uri
        description:
          type: string
        status:
          $ref: "#/components/schemas/ProductStatus"
    UpdateProductRequest:
      type: object
      minProperties: 1
      properties:
        name:
          type: string
          minLength: 1
        category:
          type: string
        price:
          type: number
          minimum: 0
        sku:
          type: string
        stockStatus:
          $ref: "#/components/schemas/StockStatus"
        imageUrl:
          type: string
          format: uri
        videoUrl:
          type: string
          format: uri
        description:
          type: string
        status:
          $ref: "#/components/schemas/ProductStatus"
    ProductResponse:
      type: object
      required:
        - data
        - warnings
      properties:
        data:
          $ref: "#/components/schemas/Product"
        warnings:
          type: array
          items:
            $ref: "#/components/schemas/Warning"
    ProductListResponse:
      type: object
      required:
        - data
        - meta
        - warnings
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Product"
        meta:
          $ref: "#/components/schemas/PaginationMeta"
        warnings:
          type: array
          items:
            $ref: "#/components/schemas/Warning"
    AssetType:
      type: string
      enum:
        - image
        - video
        - document
        - audio
        - other
    RightsStatus:
      type: string
      enum:
        - needs_review
        - approved
        - rejected
        - unknown
    UsageRights:
      type: string
      enum:
        - owned
        - licensed
        - user_generated
        - unknown
    AssetStatus:
      type: string
      enum:
        - draft
        - active
        - archived
    Asset:
      type: object
      description: Asset metadata record. assetId is canonical identity; asset names and file names are display fields only. Binary upload, rights approval, publishing, connector execution, and AI execution are outside Slice 1.
      required:
        - assetId
        - workspaceId
        - name
        - type
        - rightsStatus
        - status
        - createdAt
        - updatedAt
        - version
      properties:
        assetId:
          type: string
        workspaceId:
          type: string
        linkedProductId:
          type:
            - string
            - "null"
        linkedName:
          type:
            - string
            - "null"
          description: Optional display snapshot for the linked product. It is not product identity.
        name:
          type: string
        type:
          $ref: "#/components/schemas/AssetType"
        url:
          type:
            - string
            - "null"
          format: uri
          description: Optional metadata reference. This contract does not define binary upload.
        previewUrl:
          type:
            - string
            - "null"
          format: uri
        rightsStatus:
          $ref: "#/components/schemas/RightsStatus"
        usageRights:
          $ref: "#/components/schemas/UsageRights"
        source:
          type:
            - string
            - "null"
        quality:
          type:
            - string
            - "null"
        readiness:
          $ref: "#/components/schemas/Readiness"
        status:
          $ref: "#/components/schemas/AssetStatus"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        version:
          type: string
    CreateAssetRequest:
      type: object
      required:
        - name
        - type
      properties:
        name:
          type: string
          minLength: 1
        type:
          $ref: "#/components/schemas/AssetType"
        linkedProductId:
          type: string
        linkedName:
          type: string
          description: Optional display snapshot for the linked product. It is not product identity.
        url:
          type: string
          format: uri
          description: Optional metadata reference. This does not upload binary files.
        previewUrl:
          type: string
          format: uri
        rightsStatus:
          allOf:
            - $ref: "#/components/schemas/RightsStatus"
          default: needs_review
        usageRights:
          $ref: "#/components/schemas/UsageRights"
        source:
          type: string
        quality:
          type: string
        status:
          $ref: "#/components/schemas/AssetStatus"
    UpdateAssetRequest:
      type: object
      minProperties: 1
      properties:
        name:
          type: string
          minLength: 1
        type:
          $ref: "#/components/schemas/AssetType"
        linkedProductId:
          type: string
        linkedName:
          type: string
          description: Optional display snapshot for the linked product. It is not product identity.
        url:
          type: string
          format: uri
          description: Optional metadata reference. This does not upload binary files.
        previewUrl:
          type: string
          format: uri
        rightsStatus:
          $ref: "#/components/schemas/RightsStatus"
        usageRights:
          $ref: "#/components/schemas/UsageRights"
        source:
          type: string
        quality:
          type: string
        status:
          $ref: "#/components/schemas/AssetStatus"
    LinkAssetToProductRequest:
      type: object
      required:
        - productId
      properties:
        productId:
          type: string
          minLength: 1
          description: Canonical product identifier.
        linkedName:
          type: string
          description: Optional display snapshot for the linked product. It is not product identity.
    AssetResponse:
      type: object
      required:
        - data
        - warnings
      properties:
        data:
          $ref: "#/components/schemas/Asset"
        warnings:
          type: array
          items:
            $ref: "#/components/schemas/Warning"
    AssetListResponse:
      type: object
      required:
        - data
        - meta
        - warnings
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Asset"
        meta:
          $ref: "#/components/schemas/PaginationMeta"
        warnings:
          type: array
          items:
            $ref: "#/components/schemas/Warning"
    CampaignContentStatus:
      type: string
      enum:
        - draft
        - ready_for_review
        - in_review
        - approved
        - rejected
    ReviewStatus:
      type: string
      enum:
        - draft
        - ready_for_review
        - in_review
        - approved
        - rejected
    DisplayProductSnapshot:
      type: object
      description: Optional product display snapshot. productId remains canonical identity.
      properties:
        productId:
          type: string
        productName:
          type: string
          description: Display-only product name snapshot. It is not identity.
        category:
          type:
            - string
            - "null"
        price:
          type:
            - number
            - "null"
          minimum: 0
    DisplayAssetSnapshot:
      type: object
      description: Optional asset display snapshot. assetId remains canonical identity.
      properties:
        assetId:
          type: string
        assetName:
          type: string
          description: Display-only asset name snapshot. It is not identity.
        type:
          $ref: "#/components/schemas/AssetType"
        rightsStatus:
          $ref: "#/components/schemas/RightsStatus"
    ReviewState:
      type: object
      description: Review state for campaign content. It does not publish, schedule, execute AI, or approve asset rights automatically.
      required:
        - reviewStatus
      properties:
        reviewStatus:
          $ref: "#/components/schemas/ReviewStatus"
        submittedAt:
          type:
            - string
            - "null"
          format: date-time
        reviewedAt:
          type:
            - string
            - "null"
          format: date-time
        reviewerDisplayName:
          type:
            - string
            - "null"
          description: Display-only reviewer label. It is not identity.
        rejectionReason:
          type:
            - string
            - "null"
        requiredChanges:
          type: array
          items:
            type: string
    CampaignContent:
      type: object
      description: Campaign content metadata and editable content. campaignContentId is canonical identity. productId and selectedAssetIds link to existing Product and Asset records. Display snapshots never replace canonical IDs. Slice 2 does not execute AI, publish, schedule, upload binary assets, or call connectors.
      required:
        - campaignContentId
        - workspaceId
        - productId
        - title
        - channel
        - contentType
        - status
        - selectedAssetIds
        - body
        - reviewStatus
        - version
        - createdAt
        - updatedAt
      properties:
        campaignContentId:
          type: string
        workspaceId:
          type: string
        productId:
          type: string
          description: Canonical product identifier. productName is only allowed inside display snapshots.
        productSnapshot:
          $ref: "#/components/schemas/DisplayProductSnapshot"
        title:
          type: string
        channel:
          type: string
        contentType:
          type: string
        status:
          $ref: "#/components/schemas/CampaignContentStatus"
        selectedAssetIds:
          type: array
          description: Canonical asset identifiers for existing Asset records in the same workspace.
          items:
            type: string
        assetSnapshots:
          type: array
          description: Optional display snapshots for selected assets. assetId remains canonical identity.
          items:
            $ref: "#/components/schemas/DisplayAssetSnapshot"
        body:
          type: string
        cta:
          type:
            - string
            - "null"
        audienceSummary:
          type:
            - string
            - "null"
        offerSummary:
          type:
            - string
            - "null"
        reviewStatus:
          $ref: "#/components/schemas/ReviewStatus"
        reviewState:
          $ref: "#/components/schemas/ReviewState"
        version:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    CampaignContentCreateRequest:
      type: object
      required:
        - productId
        - title
        - channel
        - contentType
        - body
      properties:
        productId:
          type: string
          minLength: 1
          description: Canonical product identifier for existing Product record in the same workspace.
        productSnapshot:
          $ref: "#/components/schemas/DisplayProductSnapshot"
        title:
          type: string
          minLength: 1
        channel:
          type: string
          minLength: 1
        contentType:
          type: string
          minLength: 1
        status:
          $ref: "#/components/schemas/CampaignContentStatus"
        selectedAssetIds:
          type: array
          description: Canonical asset identifiers for existing Asset records in the same workspace.
          items:
            type: string
        assetSnapshots:
          type: array
          items:
            $ref: "#/components/schemas/DisplayAssetSnapshot"
        body:
          type: string
        cta:
          type: string
        audienceSummary:
          type: string
        offerSummary:
          type: string
    CampaignContentUpdateRequest:
      type: object
      minProperties: 1
      properties:
        productId:
          type: string
          description: Canonical product identifier for existing Product record in the same workspace.
        productSnapshot:
          $ref: "#/components/schemas/DisplayProductSnapshot"
        title:
          type: string
          minLength: 1
        channel:
          type: string
        contentType:
          type: string
        status:
          $ref: "#/components/schemas/CampaignContentStatus"
        selectedAssetIds:
          type: array
          description: Canonical asset identifiers for existing Asset records in the same workspace.
          items:
            type: string
        assetSnapshots:
          type: array
          items:
            $ref: "#/components/schemas/DisplayAssetSnapshot"
        body:
          type: string
        cta:
          type: string
        audienceSummary:
          type: string
        offerSummary:
          type: string
    ReviewSubmitRequest:
      type: object
      description: Optional submission metadata. submit-review moves draft or ready content toward review and does not execute AI or publish.
      properties:
        note:
          type: string
        reviewerId:
          type: string
          description: Optional reviewer reference if known. Display name is not identity.
        reviewerDisplayName:
          type: string
          description: Display-only reviewer label.
    ReviewDecisionRequest:
      type: object
      description: Review decision metadata for approve or reject actions. These actions do not publish, schedule, execute AI, or approve asset rights automatically.
      properties:
        reviewerId:
          type: string
          description: Optional reviewer reference if known. Display name is not identity.
        reviewerDisplayName:
          type: string
          description: Display-only reviewer label.
        decisionNote:
          type: string
        rejectionReason:
          type: string
        requiredChanges:
          type: array
          items:
            type: string
    CampaignContentResponse:
      type: object
      required:
        - data
        - warnings
      properties:
        data:
          $ref: "#/components/schemas/CampaignContent"
        warnings:
          type: array
          items:
            $ref: "#/components/schemas/Warning"
    CampaignContentListResponse:
      type: object
      required:
        - data
        - meta
        - warnings
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/CampaignContent"
        meta:
          $ref: "#/components/schemas/PaginationMeta"
        warnings:
          type: array
          items:
            $ref: "#/components/schemas/Warning"
    PreviewArtifact:
      type: object
      description: Preview metadata for campaign content. This is not a rendered binary upload contract and does not execute AI, publish, or schedule.
      required:
        - previewArtifactId
        - workspaceId
        - campaignContentId
        - channel
        - format
        - displaySummary
        - assetIds
        - reviewStatus
        - createdAt
      properties:
        previewArtifactId:
          type: string
        workspaceId:
          type: string
        campaignContentId:
          type: string
        channel:
          type: string
        format:
          type: string
        displaySummary:
          type: string
        assetIds:
          type: array
          description: Canonical asset identifiers for existing Asset records in the same workspace.
          items:
            type: string
        reviewStatus:
          $ref: "#/components/schemas/ReviewStatus"
        createdAt:
          type: string
          format: date-time
    PreviewArtifactCreateRequest:
      type: object
      required:
        - channel
        - format
        - displaySummary
      properties:
        channel:
          type: string
        format:
          type: string
        displaySummary:
          type: string
        assetIds:
          type: array
          description: Canonical asset identifiers for existing Asset records in the same workspace.
          items:
            type: string
        reviewStatus:
          $ref: "#/components/schemas/ReviewStatus"
    PreviewArtifactResponse:
      type: object
      required:
        - data
        - warnings
      properties:
        data:
          $ref: "#/components/schemas/PreviewArtifact"
        warnings:
          type: array
          items:
            $ref: "#/components/schemas/Warning"
    PreviewArtifactListResponse:
      type: object
      required:
        - data
        - meta
        - warnings
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/PreviewArtifact"
        meta:
          $ref: "#/components/schemas/PaginationMeta"
        warnings:
          type: array
          items:
            $ref: "#/components/schemas/Warning"
