      tags:
        - Creator Studio
      summary: Create Prompt Governance transfer draft.
      description: >
        Creates a draft transfer payload addressed to Prompt Governance for template review.
        Context selections are resolved from the CreatorContextDraft identified by draftId.
        No raw selection fields are accepted. reviewReason is informational only.
        Requires CreatorContextDraft status ready_for_transfer.
        Referenced PromptTemplate must exist and not be deprecated.
        Does not create or modify PromptTemplates autonomously. Transfer is advisory reference only.
      parameters:
        - $ref: "#/components/parameters/WorkspaceIdPath"
        - $ref: "#/components/parameters/IdempotencyKeyHeader"
        - $ref: "#/components/parameters/RequestIdHeader"
