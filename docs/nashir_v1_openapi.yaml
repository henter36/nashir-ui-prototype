        Does not auto-schedule or publish content; scheduling requires explicit user confirmation.
        Creates a pending_review draft only.
      parameters:
        - $ref: "#/components/parameters/WorkspaceIdPath"
        - $ref: "#/components/parameters/IdempotencyKeyHeader"
        - $ref: "#/components/parameters/RequestIdHeader"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatorPublishingTransferDraftCreateRequest"
