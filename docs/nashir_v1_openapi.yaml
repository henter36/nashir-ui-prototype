        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/PermissionDenied"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "410":
          $ref: "#/components/responses/Gone"
        "422":
          $ref: "#/components/responses/ValidationFailed"
        "500":
          $ref: "#/components/responses/InternalServerError"
        default:
          $ref: "#/components/responses/DefaultError"
  /workspaces/{workspaceId}/creator-studio/transfer-drafts/{transferId}:
    get:
      operationId: getCreatorTransferDraft
      tags:
        - Creator Studio
      summary: Get Creator Studio transfer draft.
      description: >
        Retrieves a workspace-scoped CreatorTransferDraft by transferId for destination module review.
        Session owner, destination module service account, or workspace admin only.
        Returns 410 Gone if the draft or its parent session or context draft has passed its TTL.
        Must not create destination records or execute transfer on retrieval.
        payloadSummary must not expose raw platform tokens, raw prompt text, or credentials.
      parameters:
        - $ref: "#/components/parameters/WorkspaceIdPath"
        - $ref: "#/components/parameters/TransferIdPath"
        - $ref: "#/components/parameters/RequestIdHeader"
