        "404":
          $ref: "#/components/responses/NotFound"
        "410":
          $ref: "#/components/responses/Gone"
        "500":
          $ref: "#/components/responses/InternalServerError"
        default:
          $ref: "#/components/responses/DefaultError"
components:
  parameters:
    WorkspaceIdPath:
      name: workspaceId
      in: path
      required: true
      description: Stable opaque workspace identifier.
      schema:
        type: string
        minLength: 1
    ProductIdPath:
      name: productId
      in: path
      required: true
      description: Stable opaque product identifier. Product names are not identity.
      schema:
        type: string
        minLength: 1
    AssetIdPath:
      name: assetId
      in: path
      required: true
      description: Stable opaque asset identifier. Asset names and file names are not identity.
      schema:
        type: string
        minLength: 1
    CampaignContentIdPath:
      name: campaignContentId
      in: path
      required: true
      description: Stable opaque campaign content identifier. Campaign content titles are not identity.
      schema:
        type: string
        minLength: 1
    LimitQuery:
      name: limit
      in: query
      required: false
      description: Maximum number of records to return.
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 25
    CursorQuery:
      name: cursor
      in: query
      required: false
      description: Cursor for the next page.
      schema:
        type: string
    StatusQuery:
      name: status
      in: query
      required: false
      description: Optional resource status filter.
      schema:
        type: string
    UpdatedAfterQuery:
      name: updatedAfter
      in: query
      required: false
      description: Return resources updated after this timestamp.
      schema:
        type: string
        format: date-time
    SortQuery:
      name: sort
      in: query
      required: false
      description: Stable sort expression such as updatedAt:desc.
      schema:
        type: string
    AssetTypeQuery:
      name: type
      in: query
      required: false
      description: Optional asset type filter.
      schema:
        $ref: "#/components/schemas/AssetType"
    LinkedProductIdQuery:
      name: linkedProductId
      in: query
      required: false
      description: Optional product link filter.
      schema:
        type: string
    IdempotencyKeyHeader:
      name: Idempotency-Key
      in: header
      required: true
      description: Required for POST create/link operations to prevent duplicate writes.
      schema:
        type: string
        minLength: 8
        maxLength: 255
    IfMatchHeader:
      name: If-Match
      in: header
      required: false
      description: Optional concurrency token. PUT operations require either If-Match or X-Resource-Version.
      schema:
        type: string
    ResourceVersionHeader:
      name: X-Resource-Version
      in: header
      required: false
      description: Optional resource version. PUT operations require either If-Match or X-Resource-Version.
      schema:
        type: string
    RequestIdHeader:
      name: X-Request-Id
      in: header
      required: false
      description: Optional client request tracking identifier.
      schema:
        type: string
    WorkflowDefinitionIdPath:
      name: workflowDefinitionId
      in: path
      required: true
      description: Stable opaque workflow definition identifier.
      schema:
        type: string
        minLength: 1
    StepKeyPath:
      name: stepKey
      in: path
      required: true
      description: Stable step key within the composite scope (workflowDefinitionId, workflowVersion) only. Not a user-facing display label.
      schema:
        type: string
        minLength: 1
    ProviderIdPath:
      name: providerId
      in: path
      required: true
      description: Stable opaque AI provider identifier.
      schema:
        type: string
        minLength: 1
    ModelRouteIdPath:
      name: modelRouteId
      in: path
      required: true
      description: Stable opaque model route identifier.
      schema:
        type: string
        minLength: 1
    PromptIdPath:
      name: promptId
      in: path
      required: true
      description: Stable opaque prompt identifier.
      schema:
        type: string
        minLength: 1
    SessionIdPath:
      name: sessionId
      in: path
      required: true
      description: Stable opaque Creator Studio session identifier.
      schema:
        type: string
        minLength: 1
    DraftIdPath:
      name: draftId
      in: path
      required: true
      description: Stable opaque Creator Studio context draft identifier.
      schema:
        type: string
        minLength: 1
    TransferIdPath:
      name: transferId
      in: path
      required: true
      description: Stable opaque Creator Studio transfer draft identifier.
      schema:
        type: string
        minLength: 1
  responses:
    BadRequest:
      description: Bad request.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorModel"
    Unauthorized:
      description: Authentication is required or was not accepted.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorModel"
    PermissionDenied:
      description: Permission denied.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorModel"
    NotFound:
      description: Resource not found.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorModel"
    Conflict:
      description: Conflict, idempotency conflict, or version mismatch.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorModel"
    ValidationFailed:
      description: Validation failed.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorModel"
    RateLimited:
      description: Rate limit exceeded.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorModel"
    InternalServerError:
      description: Internal server error.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorModel"
    Gone:
      description: Resource existed but has passed its TTL or been invalidated by an expired parent. Distinguishes from 404 (never existed).
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorModel"
    DefaultError:
      description: Error response.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorModel"
  schemas:
    HealthResponse:
      type: object
      required:
        - data
      properties:
        data:
          type: object
          required:
            - service
            - status
            - version
          properties:
            service:
              type: string
              example: nashir-v1-api
            status:
              type: string
              enum:
                - ok
                - degraded
            version:
              type: string
              example: 0.1.0
    ErrorCode:
      type: string
      enum:
        - workspace.not_found
        - resource.not_found
        - validation.failed
        - permission.denied
        - conflict.version_mismatch
        - idempotency.conflict
        - rate_limit.exceeded
        - review.required
        - publishing.blocked
        - provider.not_ready
        - model_route.not_ready
        - prompt_template.not_approved
        - cost_policy.exceeded
        - creator_studio.session.not_found
