    CreatorStudioPlatform:
      type: string
      description: Supported Creator Studio platforms in V1.
      enum:
        - Instagram
        - TikTok
        - YouTube
        - X
        - Snapchat
    CreatorStudioSessionSource:
      type: string
      description: Session creation source. V1 accepts manual only. OAuth and automated scraping are deferred.
      enum:
        - manual
    CreatorContextDraftStatus:
      type: string
      description: >
        Creator Studio context draft and session status enum.
        Transfer endpoints require ready_for_transfer. There is no reviewed state in V1.
        Expired parent session invalidates all child context and transfer drafts.
      enum:
        - draft
        - incomplete
        - needs_consent
        - needs_platform_connection
        - needs_human_review
        - ready_for_transfer
        - blocked
        - expired
    CreatorTransferDraftStatus:
      type: string
      description: Status of a Creator Studio transfer draft. All transfer drafts begin as pending_review.
      enum:
        - pending_review
        - expired
    CreatorTransferDestinationModule:
      type: string
      description: Destination module for a Creator Studio transfer draft.
      enum:
        - content_studio
        - campaign_wizard
        - publishing_queue
        - prompt_governance
    CreatorComplianceFindingSeverity:
      type: string
      enum:
        - blocker
        - warning
        - info
    CreatorComplianceFinding:
      type: object
      description: Individual compliance or readiness finding within a CreatorReadinessAssessment. Advisory only.
      required:
        - findingId
        - rule
        - status
        - severity
        - message
      properties:
        findingId:
          type: string
        rule:
          type: string
        status:
          type: string
          enum:
            - open
            - resolved
        severity:
          $ref: "#/components/schemas/CreatorComplianceFindingSeverity"
        message:
          type: string
        requiredAction:
          type:
            - string
            - "null"
        resolvedAt:
          type:
            - string
            - "null"
          format: date-time
    CreatorStudioSessionCreateRequest:
      type: object
      description: >
        Request body for creating a Creator Studio session. V1 source is manual only.
        creatorHandle is stored as an opaque reference only and must not be stored raw.
        OAuth ingestion and automated scraping are not available in V1.
      required:
        - source
      properties:
        source:
          $ref: "#/components/schemas/CreatorStudioSessionSource"
        selectedPlatform:
          $ref: "#/components/schemas/CreatorStudioPlatform"
        creatorHandle:
          type: string
          description: Creator handle reference. Stored as opaque reference only. Must not be stored raw.
        manualContext:
          type: object
          description: Free-form user-provided context notes. Must not contain OAuth tokens or credentials.
          additionalProperties: true
    CreatorStudioSession:
      type: object
      description: >
        Creator Studio session record. sessionId is canonical identity.
        Raw creator handle and platform tokens must not appear in responses.
        Session expires at or before expiresAt; expired session invalidates all child context and transfer drafts.
      required:
        - sessionId
        - workspaceId
        - source
        - status
        - createdAt
        - expiresAt
      properties:
        sessionId:
          type: string
        workspaceId:
          type: string
        source:
          $ref: "#/components/schemas/CreatorStudioSessionSource"
        selectedPlatform:
          $ref: "#/components/schemas/CreatorStudioPlatform"
        creatorHandleRef:
          type:
            - string
            - "null"
          description: Opaque creator handle reference. Raw handle must not be returned.
        status:
          $ref: "#/components/schemas/CreatorContextDraftStatus"
        createdAt:
          type: string
          format: date-time
        expiresAt:
          type: string
          format: date-time
          description: Max 24 hours. Expired session invalidates all child drafts.
    CreatorStudioSessionResponse:
      type: object
      required:
        - data
        - warnings
      properties:
        data:
          $ref: "#/components/schemas/CreatorStudioSession"
        warnings:
          type: array
          items:
            $ref: "#/components/schemas/Warning"
    CreatorContextDraftCreateRequest:
      type: object
      description: >
        Request body for persisting user-selected context references for a session.
        All fields are ID references; no raw values, labels, or platform data are accepted.
        promptTemplateId must reference a non-deprecated prompt template entry.
        templateLinkId is not a valid field name and must not be used.
      required:
        - sessionId
        - ideaId
        - angleId
        - segmentId
        - windowId
        - promptTemplateId
      properties:
        sessionId:
          type: string
          minLength: 1
        ideaId:
          type: string
          minLength: 1
        angleId:
          type: string
          minLength: 1
        segmentId:
          type: string
          minLength: 1
        windowId:
          type: string
          minLength: 1
        promptTemplateId:
          type: string
          minLength: 1
          description: References an approved, non-deprecated prompt template. Use promptTemplateId only.
    CreatorContextDraft:
      type: object
      description: >
        Creator Studio context draft. draftId is canonical identity.
        Expires at or before the parent session expiresAt.
        All fields are ID references; no raw platform values are stored.
        humanReviewRequired is always true until explicitly promoted to ready_for_transfer.
      required:
        - draftId
        - sessionId
        - workspaceId
        - ideaId
        - angleId
        - segmentId
        - windowId
        - promptTemplateId
        - status
        - humanReviewRequired
        - createdAt
        - expiresAt
      properties:
        draftId:
          type: string
        sessionId:
          type: string
        workspaceId:
          type: string
        ideaId:
          type: string
        angleId:
          type: string
        segmentId:
          type: string
        windowId:
          type: string
        promptTemplateId:
          type: string
          description: References an approved, non-deprecated prompt template. templateLinkId is not a valid field.
        status:
          $ref: "#/components/schemas/CreatorContextDraftStatus"
        humanReviewRequired:
          type: boolean
          description: Always true until explicitly promoted to ready_for_transfer.
        createdAt:
          type: string
          format: date-time
        expiresAt:
          type: string
          format: date-time
          description: Max 24 hours; capped by parent session expiresAt. Expired draft cannot be used for transfer.
    CreatorContextDraftResponse:
      type: object
      required:
        - data
        - warnings
      properties:
        data:
          $ref: "#/components/schemas/CreatorContextDraft"
        warnings:
          type: array
          items:
            $ref: "#/components/schemas/Warning"
    CreatorReadinessAssessmentCreateRequest:
      type: object
      description: Request body for triggering a readiness assessment for a context draft. Result is advisory only.
      required:
        - draftId
      properties:
        draftId:
          type: string
          minLength: 1
          description: Canonical context draft identifier. Must resolve to a valid, non-expired CreatorContextDraft in the same workspace.
    CreatorReadinessAssessment:
      type: object
      description: >
        Readiness assessment for a Creator Studio context draft. Advisory only.
        Result must not auto-block or auto-approve the context draft.
        Expires after 24 hours and must be re-evaluated for each use.
      required:
        - assessmentId
        - draftId
        - workspaceId
        - overallStatus
        - findings
        - createdAt
        - expiresAt
      properties:
        assessmentId:
          type: string
        draftId:
          type: string
        workspaceId:
          type: string
        overallStatus:
          $ref: "#/components/schemas/CreatorContextDraftStatus"
        findings:
          type: array
          items:
            $ref: "#/components/schemas/CreatorComplianceFinding"
          description: Advisory findings. Does not auto-block or auto-approve the context draft.
        blockers:
          type: array
          items:
            type: string
          description: Aggregate blocker-severity finding messages.
        warnings:
          type: array
          items:
            type: string
        createdAt:
          type: string
          format: date-time
        expiresAt:
          type: string
          format: date-time
          description: Max 24 hours. Assessment must be re-evaluated before each use.
    CreatorReadinessAssessmentResponse:
      type: object
      required:
        - data
        - warnings
      properties:
        data:
          $ref: "#/components/schemas/CreatorReadinessAssessment"
        warnings:
          type: array
          items:
            $ref: "#/components/schemas/Warning"
    CreatorContentStudioTransferOverrides:
      type: object
      description: Optional destination-specific overrides for Content Studio transfer. Overrides that alter reviewed meaning require re-review.
      properties:
        targetContentType:
          type: string
          description: Optional content type override. Must be valid for the selected platform.
    CreatorCampaignTransferOverrides:
      type: object
      description: Optional destination-specific overrides for Campaign Wizard transfer. Must not contradict reviewed context draft.
      properties:
        campaignName:
          type: string
          description: Optional campaign name annotation. Not a selection override.
        objective:
          type: string
          description: Optional campaign objective enum. Must match a supported objective value.
    CreatorPublishingTransferOverrides:
      type: object
      description: Optional destination-specific overrides for Publishing Queue transfer. Changing the publish window triggers re-review.
      properties:
        targetPublishWindow:
          type: string
          description: Optional publish window override. Must be validated against platform policy. Changes trigger re-review.
    CreatorPromptGovernanceTransferOverrides:
      type: object
      description: Optional destination-specific overrides for Prompt Governance transfer. reviewReason is informational only.
      properties:
        reviewReason:
          type: string
          description: Free-text annotation for the governance reviewer. Does not override reviewed context.
          maxLength: 2000
    CreatorContentStudioTransferDraftCreateRequest:
      type: object
      description: >
        Request body for Content Studio transfer draft creation.
        draftId references CreatorContextDraft; all context selections are resolved from it.
        No raw selection fields are accepted. CreatorContextDraft must be in ready_for_transfer status.
      required:
        - draftId
      properties:
        draftId:
          type: string
          minLength: 1
          description: Canonical context draft identifier. Must be in ready_for_transfer status.
        overrides:
          $ref: "#/components/schemas/CreatorContentStudioTransferOverrides"
    CreatorCampaignTransferDraftCreateRequest:
      type: object
      description: >
        Request body for Campaign Wizard transfer draft creation.
        draftId references CreatorContextDraft; all context selections are resolved from it.
        No raw selection fields are accepted. CreatorContextDraft must be in ready_for_transfer status.
      required:
        - draftId
      properties:
        draftId:
          type: string
          minLength: 1
          description: Canonical context draft identifier. Must be in ready_for_transfer status.
        overrides:
          $ref: "#/components/schemas/CreatorCampaignTransferOverrides"
    CreatorPublishingTransferDraftCreateRequest:
      type: object
      description: >
        Request body for Publishing Queue transfer draft creation.
        draftId references CreatorContextDraft; all context selections are resolved from it.
        contentId is required and must reference an approved, non-expired, non-archived Content Studio item in the same workspace.
        CreatorContextDraft must be in ready_for_transfer status.
      required:
        - draftId
        - contentId
      properties:
        draftId:
          type: string
          minLength: 1
          description: Canonical context draft identifier. Must be in ready_for_transfer status.
        contentId:
          type: string
          minLength: 1
          description: Canonical Content Studio item identifier. Must be approved, non-expired, non-archived, and in the same workspace.
        overrides:
          $ref: "#/components/schemas/CreatorPublishingTransferOverrides"
    CreatorPromptGovernanceTransferDraftCreateRequest:
      type: object
      description: >
        Request body for Prompt Governance transfer draft creation.
        draftId references CreatorContextDraft; all context selections are resolved from it.
        No raw selection fields are accepted. reviewReason is informational only.
        CreatorContextDraft must be in ready_for_transfer status.
      required:
        - draftId
      properties:
        draftId:
          type: string
          minLength: 1
          description: Canonical context draft identifier. Must be in ready_for_transfer status.
        overrides:
          $ref: "#/components/schemas/CreatorPromptGovernanceTransferOverrides"
    CreatorTransferDraft:
      type: object
      description: >
        Creator Studio transfer draft addressed to a destination module. transferId is canonical identity.
        Transfer drafts are draft-only; no destination record creation, AI execution, or publishing occurs.
        humanReviewRequired is always true. Expires at or before parent session and context draft expiresAt.
        Raw platform tokens, raw prompt text, and credentials must not appear in payloadSummary.
      required:
        - transferId
        - sessionId
        - contextDraftId
        - workspaceId
        - destinationModule
        - status
        - humanReviewRequired
        - createdAt
        - expiresAt
      properties:
        transferId:
          type: string
        sessionId:
          type: string
        contextDraftId:
          type: string
          description: Canonical context draft identifier. References CreatorContextDraft.
        workspaceId:
          type: string
        destinationModule:
          $ref: "#/components/schemas/CreatorTransferDestinationModule"
        status:
          $ref: "#/components/schemas/CreatorTransferDraftStatus"
        humanReviewRequired:
          type: boolean
          description: Always true. Destination module must not auto-accept the payload.
        payloadSummary:
          type: object
          description: Advisory payload summary. Must not expose raw platform tokens, raw prompt text, or credentials.
          additionalProperties: true
        createdAt:
          type: string
          format: date-time
        expiresAt:
          type: string
          format: date-time
          description: Max 24 hours; capped by parent session and context draft expiresAt.
    CreatorTransferDraftResponse:
      type: object
      required:
        - data
        - warnings
      properties:
        data:
          $ref: "#/components/schemas/CreatorTransferDraft"
        warnings:
          type: array
          items:
            $ref: "#/components/schemas/Warning"
    CreatorProfileSnapshotRef:
      type: object
      description: >
        Opaque reference to a creator profile snapshot. Reserved for schema naming consistency only.
        Not used in V1 endpoints. Deferred until OAuth, consent, and privacy gates are approved.
        Must never include raw platform API payload, individual audience member data, or OAuth tokens.
      required:
        - snapshotRef
      properties:
        snapshotRef:
          type: string
          description: Opaque snapshot identifier. Not a platform-specific handle or token.
        platform:
          $ref: "#/components/schemas/CreatorStudioPlatform"
        snapshotAt:
          type:
            - string
            - "null"
          format: date-time
        confidenceLabel:
          type:
            - string
            - "null"
        dataSource:
          type:
            - string
            - "null"
